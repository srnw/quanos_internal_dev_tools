# Local development overrides — automatically applied by `docker compose up`
# Exposes MongoDB for direct access and mounts backend source for faster iteration.
services:
  mongo:
    ports:
      - "27017:27017"

  mongo-express:
    image: mongo-express:1.0.2-20-alpine3.19
    restart: unless-stopped
    ports:
      - "8081:8081"
    depends_on:
      mongo:
        condition: service_healthy
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: ${MONGO_ROOT_USERNAME:-root}
      ME_CONFIG_MONGODB_ADMINPASSWORD: ${MONGO_ROOT_PASSWORD:-example}
      ME_CONFIG_MONGODB_URL: mongodb://${MONGO_ROOT_USERNAME:-root}:${MONGO_ROOT_PASSWORD:-example}@mongo:27017/
      ME_CONFIG_BASICAUTH: "false"

  backend:
    build:
      target: builder
    environment:
      NODE_ENV: development
    ports:
      - "3000:3000"
    volumes:
      - ./backend:/app/backend:z
      - /app/backend/node_modules
    command: ["sh", "-c", "cd /app/backend && pnpm start:dev"]
